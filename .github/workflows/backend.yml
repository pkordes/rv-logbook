# Branch CI — runs on every push to a non-main branch.
# Goal: fast feedback in < 2 min. No DB required, no API diffing.
# Heavier checks (oasdiff, integration tests) live in backend-pr.yml.
name: Backend

on:
  push:
    branches: ["**", "!main"]

jobs:
  build-and-lint:
    name: Backend / Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Install the same tools that developers install locally (see CONTRIBUTING.md).
      # Using the same make targets as local dev guarantees flags and behaviour are identical.
      - name: Install tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install gotest.tools/gotestsum@latest

      - name: Lint
        run: make backend/lint

      - name: Build
        run: make backend/build

      # Unit tests only (no DB). make backend/test/unit clears TEST_DATABASE_URL
      # so integration tests skip even if the variable leaks from the environment.
      - name: Test (unit)
        run: make backend/test/unit

      # gosec performs static analysis on Go source for security anti-patterns:
      # hardcoded credentials, SQL injection vectors, unsafe syscall usage, etc.
      # It is fast (< 5 s on this codebase) so it belongs at the branch tier.
      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-dir=internal/handler/gen ./...

