# PR CI — runs when a pull request targets main.
# Goal: gate quality before merging. Re-runs fast checks on the merge commit
# and adds slower checks that require a baseline (oasdiff) or infrastructure
# (integration tests, added in Phase 8).
name: Backend PR

on:
  pull_request:
    branches: [main]

jobs:
  # Re-run the same fast checks as the branch workflow on the actual merge
  # commit. A branch can be clean while the combined merge introduces an issue.
  unit-tests:
    name: Backend / Vet, Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install gotest.tools/gotestsum@latest

      - name: Lint
        run: make backend/lint

      - name: Build
        run: make backend/build

      - name: Test (unit)
        run: make backend/test/unit

  # oasdiff compares the PR's openapi.yaml against the main baseline and fails
  # the build if any breaking changes are detected. This check only makes sense
  # at PR time — there is no meaningful baseline to diff against on a branch push.
  breaking-api-changes:
    name: Backend / No Breaking API Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install oasdiff
        run: go install github.com/oasdiff/oasdiff@v1.11.10

      # Fetch only the tip of main — enough to extract the baseline spec.
      - name: Fetch main for baseline
        run: git fetch origin main --depth=1

      - name: Check for breaking changes
        run: |
          git show origin/main:backend/spec/openapi.yaml > /tmp/openapi-base.yaml
          oasdiff breaking /tmp/openapi-base.yaml backend/spec/openapi.yaml

  integration-tests:
    name: Backend / Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rvlogbook_test
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install tools
        run: go install gotest.tools/gotestsum@latest

      # All tests including integration tests (make backend/test has no -short).
      # TEST_DATABASE_URL is read by testutil.NewPool; without it integration
      # tests skip automatically — so the unit-test job above is unaffected.
      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/rvlogbook_test
        run: make backend/test

  # govulncheck scans the Go module graph against the Go vulnerability database
  # (https://vuln.go.dev). It checks only packages that are actually reachable
  # in the build — not every transitive download — keeping noise low.
  # Lives at PR tier: it makes a network call to the vuln DB and takes ~20s.
  vuln-scan:
    name: Backend / Vulnerability Scan (govulncheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: backend

  # CodeQL performs deep semantic analysis on the Go source code — it tracks
  # tainted data flows across function boundaries, catching injection and path
  # traversal bugs that static linters miss.
  # Free for public repos. Lives at PR tier: 3–8 min build time.
  codeql:
    name: Backend / CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for CodeQL to upload SARIF results to the Security tab.
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          # queries: security-extended  # Uncomment to enable broader query suite

      - name: Build for CodeQL
        run: make backend/build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:go
